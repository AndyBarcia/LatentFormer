_BASE_: ../coco/panoptic-segmentation/Base-COCO-PanopticSegmentation.yaml

MODEL:
  META_ARCHITECTURE: "LatentFormer"
  SEM_SEG_HEAD:
    NAME: "LatentFormerHead"
    PIXEL_DECODER_NAME: "LatentFPN"
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
    IGNORE_VALUE: 255
    NUM_CLASSES: 133
    LOSS_WEIGHT: 1.0
    CONVS_DIM: 256
    MASK_DIM: 256
    NORM: "GN"
    COMMON_STRIDE: 4
    LATENT_FPN_NUM_LEVELS: 3
  LATENT_FORMER:
    TRANSFORMER_DECODER_NAME: "LatentTransformerDecoder"
    TRANSFORMER_IN_FEATURE: "multi_scale_fpn"
    DEEP_SUPERVISION: True
    NO_OBJECT_WEIGHT: 0.1
    SIMILARITY_METRIC: "dot"
    SEED_COST_WEIGHT: 1.0
    HIDDEN_DIM: 256
    NUM_OBJECT_QUERIES: 100
    NHEADS: 8
    DROPOUT: 0.0
    DIM_FEEDFORWARD: 2048
    ENC_LAYERS: 0
    DEC_LAYERS: 10
    PRE_NORM: False
    ENFORCE_INPUT_PROJ: False
    SIZE_DIVISIBILITY: 32
    TEST:
      SEMANTIC_ON: True
      INSTANCE_ON: True
      PANOPTIC_ON: True
      SEM_SEG_POSTPROCESSING_BEFORE_INFERENCE: False
      SCORE_THRESHOLD: 0.0
